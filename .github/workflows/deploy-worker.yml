name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - master
    paths:
      - 'project/workers/metadata-fetcher/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd project/workers/metadata-fetcher
          npm install
          npx wrangler deploy