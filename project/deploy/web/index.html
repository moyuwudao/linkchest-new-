<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkChest - 智能收藏管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            color: white;
            padding: 60px 20px;
        }
        .header h1 {
            font-size: 48px;
            margin-bottom: 16px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .header p {
            font-size: 18px;
            opacity: 0.9;
        }
        .login-box {
            background: white;
            max-width: 400px;
            margin: 0 auto 40px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-box h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
        }
        .result.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }
        .result.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }
        .dashboard {
            display: none;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-card h3 {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 8px;
        }
        .stat-card p {
            color: #666;
            font-size: 14px;
        }
        .logout-btn {
            background: #dc3545;
            padding: 8px 20px;
            width: auto;
            font-size: 14px;
        }
        .footer {
            text-align: center;
            color: white;
            padding: 40px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>LinkChest</h1>
            <p>智能收藏管理平台 - 统一管理你的全网收藏</p>
        </div>

        <div class="login-box" id="loginBox">
            <h2>用户登录</h2>
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" value="test@linkchest.cn" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" value="password" placeholder="请输入密码">
            </div>
            <button id="loginBtn" onclick="login()">登录</button>
            <div id="result" class="result"></div>
        </div>

        <div class="dashboard" id="dashboard">
            <div class="dashboard-header">
                <div class="user-info">
                    <div class="avatar" id="userAvatar">测</div>
                    <div>
                        <h3 id="userName">测试用户</h3>
                        <p id="userEmail">test@linkchest.cn</p>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3 id="collectionCount">0</h3>
                    <p>收藏总数</p>
                </div>
                <div class="stat-card">
                    <h3 id="listCount">0</h3>
                    <p>清单数量</p>
                </div>
                <div class="stat-card">
                    <h3 id="tagCount">0</h3>
                    <p>标签数量</p>
                </div>
            </div>

            <h3>系统状态</h3>
            <div style="margin-top: 16px; padding: 16px; background: #f8f9fa; border-radius: 8px;">
                <p><strong>API服务:</strong> <span style="color: green;">运行中</span></p>
                <p><strong>数据库:</strong> <span style="color: green;">已连接</span></p>
                <p><strong>服务器时间:</strong> <span id="serverTime">-</span></p>
            </div>
        </div>

        <div class="footer">
            <p>LinkChest 国内版 | 服务器: 43.136.82.88 | 备案中</p>
        </div>
    </div>

    <script>
        const API_BASE = 'http://43.136.82.88:3001';

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const result = document.getElementById('result');

            btn.disabled = true;
            btn.textContent = '登录中...';
            result.className = 'result';

            try {
                const response = await fetch(`${API_BASE}/api/auth/login-email`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showDashboard(data.user);
                } else {
                    result.className = 'result error';
                    result.textContent = data.error || '登录失败';
                }
            } catch (error) {
                result.className = 'result error';
                result.textContent = '网络错误: ' + error.message;
            } finally {
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        function showDashboard(user) {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('userName').textContent = user.nickname || user.name || '用户';
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('userAvatar').textContent = (user.nickname || user.name || '用').charAt(0);
            document.getElementById('serverTime').textContent = new Date().toLocaleString('zh-CN');
            loadStats();
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
        }

        async function loadStats() {
            const token = localStorage.getItem('token');
            if (!token) return;

            try {
                const response = await fetch(`${API_BASE}/api/collections`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('collectionCount').textContent = data.length || 0;
                }
            } catch (e) {
                console.error('加载统计失败:', e);
            }
        }

        // 检查是否已登录
        window.onload = function() {
            const user = localStorage.getItem('user');
            if (user) {
                showDashboard(JSON.parse(user));
            }
        };

        // 回车键登录
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
