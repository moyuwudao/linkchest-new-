# LinkChest Nginx 反向代理配置
# 安装后软链接到: /etc/nginx/sites-enabled/linkchest

# HTTP: 强制跳转 HTTPS
server {
    listen 80;
    server_name linkchest.net www.linkchest.net;

    # Certbot 验证路径（申请/续期证书时需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他请求强制跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: 主站 + API 代理
server {
    listen 443 ssl http2;
    server_name linkchest.net www.linkchest.net;

    # SSL 证书路径（Certbot 申请后会自动配置）
    ssl_certificate /etc/letsencrypt/live/linkchest.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/linkchest.net/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # OCSP Stapling（解决国内 Windows 客户端无法访问 Let's Encrypt OCSP 服务器的问题）
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/linkchest.net/chain.pem;
    resolver 8.8.8.8 223.5.5.5 valid=300s;
    resolver_timeout 5s;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Brotli 压缩（需 nginx 安装 brotli 模块，如 ngx_brotli）
    # 启用后优先使用 Brotli（压缩率比 gzip 高 15-25%）
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # 静态资源（Next.js 构建产物）
    # 直接从文件系统提供，避免代理到 Next.js 引发 400/MIME 类型错误
    location /_next/static/ {
        alias /opt/linkchest/api/apps/web/.next/static/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # API 请求 → Express 后端 (3001)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # 支持大请求体（上传图片）
        client_max_body_size 10M;

        # 支持长连接和流式响应
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;

        # CORS 预检
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            return 204;
        }
    }

    # 公开分享页 → Next.js Web 前端 (3003)
    # API 的 /s/:shareId 会重定向到 WEB_BASE_URL，若代理到 API 会形成循环重定向
    location /s/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;

        # 分享页公开数据可短时缓存，提升打开速度
        # 静态资源（/_next/static/）有独立的 location，不受此影响
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=60, s-maxage=60, stale-while-revalidate=300" always;
        expires 60s;
    }

    # 健康检查 → Express 后端
    location /health {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # 其他所有请求 → Next.js Web (3003)
    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        add_header Cross-Origin-Opener-Policy "unsafe-none" always;

        # 防止 HTML 页面缓存，确保部署后用户立即看到更新
        # 静态资源（/_next/static/）有独立的 location，不受此影响
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }
}
