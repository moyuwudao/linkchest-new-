<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#c9956b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="900" cy="150" r="300" fill="#d4a574" opacity="0.03"/>
  <circle cx="200" cy="500" r="200" fill="#d4a574" opacity="0.02"/>
  
  <!-- Link chain decoration -->
  <g opacity="0.08" transform="translate(1000, 480) rotate(-15)">
    <rect x="0" y="0" width="60" height="24" rx="12" fill="none" stroke="#d4a574" stroke-width="6"/>
    <rect x="42" y="0" width="60" height="24" rx="12" fill="none" stroke="#d4a574" stroke-width="6"/>
    <rect x="84" y="0" width="60" height="24" rx="12" fill="none" stroke="#d4a574" stroke-width="6"/>
  </g>
  
  <!-- Main content -->
  <g transform="translate(100, 180)">
    <!-- Logo mark -->
    <image x="0" y="0" width="72" height="72" href="/logo.png" preserveAspectRatio="xMidYMid meet"/>
    
    <!-- Brand name -->
    <text x="0" y="130" font-family="'Bodoni Moda', 'Noto Serif SC', serif" font-size="72" font-weight="600" fill="#f5f0e8" letter-spacing="2">链藏</text>
    <text x="0" y="200" font-family="'DM Sans', system-ui, sans-serif" font-size="48" font-weight="500" fill="#d4a574" letter-spacing="4">LinkChest</text>
    
    <!-- Tagline -->
    <text x="0" y="280" font-family="'DM Sans', system-ui, sans-serif" font-size="28" font-weight="400" fill="#f5f0e8" opacity="0.7">全网好内容，一键收入链藏</text>
  </g>
  
  <!-- Feature icons row -->
  <g transform="translate(100, 480)" opacity="0.5">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="16" fill="#f5f0e8" opacity="0.6">跨平台收藏 · 智能整理 · 一键分享 · 订阅同步</text>
  </g>
  
  <!-- Right side visual -->
  <g transform="translate(750, 140)">
    <!-- Card mockups -->
    <rect x="0" y="0" width="320" height="200" rx="16" fill="#f5f0e8" opacity="0.95"/>
    <rect x="20" y="20" width="280" height="120" rx="8" fill="#e8e0d4"/>
    <rect x="20" y="155" width="160" height="12" rx="4" fill="#c9b99a"/>
    <rect x="20" y="175" width="100" height="8" rx="3" fill="#d4c9b8"/>
    
    <rect x="40" y="40" width="320" height="200" rx="16" fill="#f5f0e8" opacity="0.7"/>
    <rect x="60" y="60" width="280" height="120" rx="8" fill="#e8e0d4" opacity="0.7"/>
    
    <rect x="80" y="80" width="320" height="200" rx="16" fill="#f5f0e8" opacity="0.4"/>
  </g>
</svg>
