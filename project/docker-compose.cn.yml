# docker-compose.cn.yml - 国内运营方案数据库配置
# 服务器B: 2核4G6M 专用于 PostgreSQL
# 更新时间: 2026-05-18

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: linkchest-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-linkchest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_strong_password}
      POSTGRES_DB: ${POSTGRES_DB:-linkchest}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    command: >
      postgres 
      -c listen_addresses='*' 
      -c max_connections=100 
      -c shared_buffers=1GB 
      -c effective_cache_size=2GB 
      -c work_mem=8MB 
      -c maintenance_work_mem=256MB 
      -c wal_buffers=16MB 
      -c checkpoint_completion_target=0.9 
      -c wal_writer_delay=10ms
    ports:
      - "0.0.0.0:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkchest"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - linkchest-net

volumes:
  postgres_data:

networks:
  linkchest-net:
    driver: bridge